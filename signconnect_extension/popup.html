<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignConnect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 400px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }

    .header {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
    }

    .header span { font-size: 22px; }

    .status-bar {
      padding: 10px 16px;
      background: #1e293b;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #94a3b8;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }

    .status-dot.active { background: #22c55e; }

    .section {
      padding: 16px;
      border-bottom: 1px solid #1e293b;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 12px;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover { background: #2563eb; }

    .btn-success {
      background: #22c55e;
      color: white;
    }

    .btn-success:hover { background: #16a34a; }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover { background: #dc2626; }

    .btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
    }

    .btn-secondary:hover { background: #334155; }

    .btn + .btn { margin-top: 8px; }

    .select {
      width: 100%;
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 13px;
      cursor: pointer;
    }

    .detected-sign {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
    }

    .detected-sign .sign-text {
      font-size: 20px;
      font-weight: 700;
      color: #3b82f6;
    }

    .detected-sign .sign-label {
      font-size: 11px;
      color: #64748b;
    }

    .footer {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer a {
      font-size: 12px;
      color: #64748b;
      text-decoration: none;
    }

    .footer a:hover { color: #3b82f6; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .toggle-label {
      font-size: 13px;
      color: #cbd5e1;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #334155;
      border-radius: 22px;
      transition: 0.3s;
    }

    .slider:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider { background: #3b82f6; }
    input:checked + .slider:before { transform: translateX(18px); }
  </style>
</head>
<body>
  <div class="header">
    <span>🤟</span>
    <h1>SignConnect</h1>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Detection inactive</span>
  </div>

  <div class="section">
    <div class="section-title">Sign Detection</div>
    <div class="detected-sign" id="detectedSign">
      <span class="sign-label">No sign detected yet</span>
    </div>
    <div style="margin-top: 10px;">
      <button class="btn btn-success" id="startBtn">▶ Start Detection</button>
      <button class="btn btn-danger" id="stopBtn" style="display:none;">⏹ Stop Detection</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Settings</div>
    <div class="toggle-row">
      <span class="toggle-label">Auto-detect on page load</span>
      <label class="toggle">
        <input type="checkbox" id="autoDetect" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Show overlay on video calls</span>
      <label class="toggle">
        <input type="checkbox" id="showOverlay" checked />
        <span class="slider"></span>
      </label>
    </div>
    <div style="margin-top: 10px;">
      <select class="select" id="signLanguage">
        <option value="ASL">ASL - American Sign Language</option>
        <option value="BSL">BSL - British Sign Language</option>
        <option value="ISL">ISL - Indian Sign Language</option>
      </select>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="optionsLink">⚙ Options</a>
    <a href="https://github.com/Hritikadas/signconnect" target="_blank">GitHub</a>
    <span style="font-size:12px; color:#334155;">v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
